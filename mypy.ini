[mypy]
python_version = 3.12
ignore_missing_imports = True
implicit_optional = True
follow_imports = silent
check_untyped_defs = False
disallow_untyped_defs = False
# Mantenim attr-defined I union-attr ACTIUS — son els que atrapen el bug del 28/06.
disable_error_code = var-annotated, no-any-return, no-redef, return-value, assignment, operator, call-overload
